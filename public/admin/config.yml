backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "programs"
    label: "Program Belajar"
    folder: "content/programs"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nama Program", name: "title", widget: "string"}
      - {label: "Keterangan Singkat", name: "description", widget: "text"}
      - {label: "Body Konten", name: "body", widget: "markdown"}

  - name: "trainers"
    label: "Tim Mentor"
    folder: "content/trainers"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nama & Gelar", name: "title", widget: "string"}
      - {label: "Foto Profil", name: "image", widget: "image"}
      - {label: "List Prestasi & Sanad", name: "body", widget: "markdown"}