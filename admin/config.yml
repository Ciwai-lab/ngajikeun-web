backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "programs"
    label: "Program Belajar"
    folder: "content/programs"
    create: true
    extension: "json" # Biar output filenya .json
    format: "json"
    slug: "{{title}}"
    fields:
      - {label: "Judul Program", name: "title", widget: "string"}
      - {label: "Deskripsi Singkat", name: "description", widget: "text"}
      - {label: "Harga/Infaq", name: "price", widget: "string", default: "Gratis"}
      - {label: "Gambar (Optional)", name: "image", widget: "image", required: false}

  - name: "mentors"
    label: "Tim Mentor"
    folder: "content/mentors"
    create: true
    extension: "json"
    format: "json"
    slug: "{{name}}"
    fields:
      - {label: "Nama Lengkap", name: "name", widget: "string"}
      - {label: "Gelar/Spesialisasi", name: "specialty", widget: "string"}
      - {label: "Sanad & Pengalaman", name: "bio", widget: "text"}
      - {label: "Foto Profil", name: "image", widget: "image"}